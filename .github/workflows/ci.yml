name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Unit tests with race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - name: Vulnerability scan
        run: govulncheck ./...

  native-test:
    name: Native test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test ./...

  linux-distribution-matrix:
    name: Linux distributions (${{ matrix.arch }})
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Run native backend across distributions
        env:
          LINUX_TEST_ARCH: ${{ matrix.arch }}
        run: ./test/linux_container_matrix.sh

  linux-arm64-real-jellyfin:
    name: Real Jellyfin and storage faults (arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Run native arm64 release gate
        run: sudo env "PATH=$PATH" ./test/linux_real_arm64_jellyfin.sh

  linux-package:
    name: Linux package (${{ matrix.arch }}, ${{ matrix.format }})
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        format: [deb, rpm]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install RPM build tools
        if: matrix.format == 'rpm'
        run: sudo apt-get update && sudo apt-get install --yes rpm
      - name: Verify reproducible native package
        run: ./test/package_linux_native.sh '${{ matrix.arch }}' '${{ matrix.format }}'

  windows-clean-init:
    name: Clean init (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build Windows binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build\clean-init | Out-Null
          go build -o build\clean-init\jellyfin-remora.exe .\cmd\jellyfin-remora
          go build -o build\clean-init\remoractl.exe .\cmd\remoractl
      - name: Discover volume and validate clean init
        shell: pwsh
        run: |
          .\packaging\windows\test-clean-init.ps1 `
            -DaemonPath .\build\clean-init\jellyfin-remora.exe `
            -ControlPath .\build\clean-init\remoractl.exe `
            -WorkingDirectory $env:RUNNER_TEMP

  cross-build:
    name: Cross-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: make cross-build
      - uses: actions/upload-artifact@v7
        with:
          name: cross-builds
          path: build/
          if-no-files-found: error

  plist:
    name: Validate launchd plist
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - run: plutil -lint packaging/io.github.chowdpa02k.jellyfin-remora.plist

  windows-package:
    name: Windows package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Restore pinned WiX tool
        run: dotnet tool restore
      - name: Build unsigned development ZIPs and MSIs
        shell: pwsh
        run: |
          .\packaging\windows\package.ps1 -Version 0.6.0-alpha -OutputDirectory build\windows\old -BuildMsi
          .\packaging\windows\package.ps1 -Version 0.6.1-alpha -OutputDirectory build\windows\new -BuildMsi
      - name: Test MSI rollback and lifecycle
        shell: pwsh
        run: |
          .\packaging\windows\test-msi.ps1 `
            -OldMsi (Resolve-Path '.\build\windows\old\*.msi') `
            -NewMsi (Resolve-Path '.\build\windows\new\*.msi')
      - uses: actions/upload-artifact@v7
        with:
          name: windows-packages-unsigned-${{ matrix.os }}
          path: build/windows/**/*-unsigned.*
          if-no-files-found: error
