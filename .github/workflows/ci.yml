name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Unit tests with race detector
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - name: Vulnerability scan
        run: govulncheck ./...

  native-test:
    name: Native test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test ./...

  cross-build:
    name: Cross-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: make cross-build
      - uses: actions/upload-artifact@v7
        with:
          name: cross-builds
          path: build/
          if-no-files-found: error

  plist:
    name: Validate launchd plist
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - run: plutil -lint packaging/io.github.chowdpa02k.jellyfin-remora.plist
