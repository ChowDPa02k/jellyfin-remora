config-version: 1

restapi:
  listen: 127.0.0.1
  port: 8095
  unix-socket: /tmp/jellyfin-remora.sock

remora:
  server-start-timeout: 30s
  server-stop-timeout: 300s
  heartbeat-interval: 1s
  health-api-heartbeat: 10
  io-timeout: 5s
  recovery-successes: 3
  api-failure-threshold: 3
  user-login-watchdog:
    enabled: true
    heartbeat: 60
    user: remora
    password: replace-with-a-watchdog-password
  data-dir: default
  logs:
    path: log
    level: info
    rotation-time: 24h
    rotation-size-mb: 30
    preserve-time: 168h

disk:
  - type: physical
    uuid: REPLACE-WITH-VOLUME-UUID
    target: /Volumes/AppData
    permission: rw
    heartbeat: 1
  # - type: smb
  #   device: //192.168.1.20/AppData
  #   user: jellyfin
  #   password: replace-me
  #   target: /Volumes/AppData
  #   permission: rw
  #   heartbeat: 3
  # - type: nfs
  #   device: 192.168.1.20:/exports/AppData
  #   options: vers=4,soft
  #   target: /Volumes/AppData
  #   permission: rw

jellyfin:
  path: /Applications/Jellyfin.app/Contents/MacOS
  run-as-user: REPLACE-WITH-MACOS-USER
  data-dir: /Volumes/AppData/Jellyfin/data
  config-dir: /Volumes/AppData/Jellyfin/config
  cache-dir: /Volumes/AppData/Jellyfin/cache
  log-dir: /Volumes/AppData/Jellyfin/log
  web-dir: default
  parameters: {}
  general:
    paths:
      cache-path: null # null/default restores Jellyfin's default
      metadata-path: default
    performance:
      parallel-library-scan-tasks-limit: 1
      parallel-image-encoding-limit: null
  branding:
    login-disclaimer: "Welcome to Jellyfin"
    # custom-css-code: /absolute/path/to/custom.css
    # enable-splash-screen: true
    # splash-screen-image: /absolute/path/to/splash.png
  # playback:
  #   transcoding:
  #     transcode-path: /Volumes/AppData/Jellyfin/cache/transcodes
  #     enable-fallback-fonts: true
  #     fallback-font-folder-path: /Volumes/AppData/Jellyfin/config/fonts
  networking:
    server-address-settings:
      local-http-port-number: 8096
      enable-https: false
      base-url: null
      bind-to-local-network-address: null
    ip-protocols:
      enable-ipv4: true
      enable-ipv6: false

# Used only when Jellyfin reports that its startup wizard is incomplete.
init:
  server-name: Jellyfin
  display-language: English
  user: admin
  password: replace-with-an-administrator-password
  preferred-metadata-language: English
  preferred-metadata-region: United States
  allow-remote-connections: true
